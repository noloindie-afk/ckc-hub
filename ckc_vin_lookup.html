
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CKC VIN Lookup</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800;900&family=Barlow:wght@400;500;600&family=Barlow+Semi+Condensed:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --gold: #c9a227; --gold-light: #e8c547;
    --dark: #0d0d0d; --card: #181818; --border: #272727;
    --text: #f0f0f0; --muted: #777;
    --green: #4ade80; --green-bg: rgba(74,222,128,0.1);
    --amber: #f59e0b; --amber-bg: rgba(245,158,11,0.1);
    --red: #f87171; --red-bg: rgba(248,113,113,0.1);
    --blue: #60a5fa; --blue-bg: rgba(96,165,250,0.1);
    --purple: #c084fc; --purple-bg: rgba(192,132,252,0.1);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--dark); color: var(--text); font-family: 'Barlow', sans-serif; font-size: 15px; line-height: 1.5; min-height: 100vh; }
  .app-header { background: #111; border-bottom: 2px solid var(--gold); padding: 16px 24px; display: flex; justify-content: space-between; align-items: center; }
  .app-header .logo { font-family: 'Barlow Condensed', sans-serif; font-size: 1.5rem; font-weight: 900; color: var(--gold); letter-spacing: 1px; }
  .app-header .sub { font-family: 'Barlow Condensed', sans-serif; font-size: 0.75rem; font-weight: 600; letter-spacing: 3px; text-transform: uppercase; color: var(--muted); margin-top: 2px; }
  .app-header .phone { font-family: 'Barlow Condensed', sans-serif; font-size: 1.2rem; font-weight: 700; color: var(--gold-light); }
  .app-body { max-width: 720px; margin: 0 auto; padding: 32px 20px 60px; }
  .input-section { background: var(--card); border: 1px solid var(--border); border-radius: 14px; padding: 28px 28px 24px; margin-bottom: 20px; }
  .input-label { font-family: 'Barlow Condensed', sans-serif; font-size: 0.7rem; font-weight: 700; letter-spacing: 3px; text-transform: uppercase; color: var(--muted); margin-bottom: 10px; }
  .input-row { display: flex; gap: 10px; margin-bottom: 14px; }
  .vin-field { flex: 1; background: #222; border: 2px solid var(--border); border-radius: 10px; padding: 14px 18px; font-family: 'Barlow Semi Condensed', monospace; font-size: 1.3rem; font-weight: 600; color: var(--text); letter-spacing: 3px; text-transform: uppercase; transition: border-color 0.2s; outline: none; }
  .vin-field:focus { border-color: var(--gold); }
  .vin-field::placeholder { color: #444; letter-spacing: 1px; font-size: 1rem; font-weight: 400; }
  .lookup-btn { padding: 14px 28px; background: var(--gold); color: #111; border: none; border-radius: 10px; font-family: 'Barlow', sans-serif; font-size: 1rem; font-weight: 700; cursor: pointer; transition: all 0.2s; white-space: nowrap; }
  .lookup-btn:hover { background: var(--gold-light); transform: translateY(-1px); }
  .examples-row { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; }
  .examples-label { font-size: 0.8rem; color: var(--muted); margin-right: 4px; }
  .ex-btn { background: #222; border: 1px solid var(--border); color: var(--muted); padding: 5px 12px; border-radius: 6px; font-size: 0.8rem; font-family: 'Barlow', sans-serif; cursor: pointer; transition: all 0.15s; }
  .ex-btn:hover { border-color: var(--gold); color: var(--gold-light); background: #1a1a1a; }
  .error-bar { background: var(--red-bg); border: 1px solid rgba(248,113,113,0.3); border-radius: 8px; padding: 10px 16px; font-size: 0.88rem; color: var(--red); margin-bottom: 16px; display: none; }
  .decoded-pill { background: rgba(201,162,39,0.08); border: 1px solid rgba(201,162,39,0.2); border-radius: 8px; padding: 10px 16px; font-size: 0.88rem; color: #b8a060; margin-bottom: 20px; display: none; }
  .decoded-pill strong { color: var(--gold-light); font-size: 1rem; }
  .result-card { background: var(--card); border: 1px solid var(--border); border-radius: 14px; overflow: hidden; display: none; }
  .result-tier-bar { padding: 18px 24px; }
  .tier-badge { font-family: 'Barlow Condensed', sans-serif; font-size: 0.8rem; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; padding: 4px 12px; border-radius: 6px; white-space: nowrap; display: inline-block; }
  .t1 { background: var(--green-bg); color: var(--green); }
  .t2 { background: var(--amber-bg); color: var(--amber); }
  .t3 { background: var(--red-bg); color: var(--red); }
  .t4 { background: var(--purple-bg); color: var(--purple); }
  .tier-vehicle { font-family: 'Barlow Condensed', sans-serif; font-size: 1.2rem; font-weight: 700; color: var(--text); margin-top: 8px; }
  .tier-keytype { font-size: 0.85rem; color: var(--muted); margin-top: 2px; }
  .price-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1px; background: var(--border); border-top: 1px solid var(--border); border-bottom: 1px solid var(--border); }
  .price-box { background: #111; padding: 20px 24px; }
  .price-box-label { font-family: 'Barlow Condensed', sans-serif; font-size: 0.7rem; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); margin-bottom: 6px; }
  .price-box-value { font-family: 'Barlow Condensed', sans-serif; font-size: 2rem; font-weight: 800; line-height: 1; margin-bottom: 4px; }
  .price-box.aak .price-box-value { color: var(--green); }
  .price-box.akl .price-box-value { color: var(--amber); }
  .price-box-note { font-size: 0.78rem; color: var(--muted); line-height: 1.4; }
  .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0; border-bottom: 1px solid var(--border); }
  .info-cell { padding: 14px 24px; border-right: 1px solid var(--border); border-bottom: 1px solid var(--border); }
  .info-cell:nth-child(2n) { border-right: none; }
  .info-cell:nth-last-child(-n+2) { border-bottom: none; }
  .info-cell-label { font-size: 0.72rem; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 3px; }
  .info-cell-value { font-size: 0.92rem; color: var(--text); font-weight: 500; }
  .flags-section { padding: 16px 20px; border-bottom: 1px solid var(--border); display: flex; flex-direction: column; gap: 8px; }
  .flag-item { display: flex; align-items: flex-start; gap: 10px; padding: 10px 14px; border-radius: 8px; font-size: 0.88rem; line-height: 1.5; }
  .flag-dot { width: 7px; height: 7px; border-radius: 50%; background: currentColor; margin-top: 5px; flex-shrink: 0; }
  .flag-warn    { background: var(--amber-bg); color: var(--amber); }
  .flag-info    { background: var(--blue-bg);  color: var(--blue); }
  .flag-danger  { background: var(--red-bg);   color: var(--red); }
  .flag-success { background: var(--green-bg); color: var(--green); }
  .script-section { padding: 20px 24px; }
  .script-section-label { font-family: 'Barlow Condensed', sans-serif; font-size: 0.7rem; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); margin-bottom: 10px; }
  .script-text { font-size: 0.95rem; color: #c8b87a; font-style: italic; line-height: 1.7; padding: 14px 18px; background: rgba(201,162,39,0.06); border-left: 3px solid var(--gold); border-radius: 0 8px 8px 0; }
  @media (max-width: 500px) {
    .price-grid, .info-grid { grid-template-columns: 1fr; }
    .info-cell { border-right: none; border-bottom: 1px solid var(--border); }
    .input-row { flex-direction: column; }
    .vin-field { font-size: 1rem; letter-spacing: 1px; }
  }
</style>
</head>
<body>
<div class="app-header">
  <div>
    <div class="logo">Carolina Key Cutters</div>
    <div class="sub">VIN Pricing Lookup — James</div>
  </div>
  <div class="phone">(336) 510-9816</div>
</div>
<div class="app-body">
  <div class="input-section">
    <div class="input-label">Enter VIN Number</div>
    <div class="input-row">
      <input type="text" class="vin-field" id="vin-input" maxlength="17"
        placeholder="17-digit VIN"
        autocomplete="off" autocorrect="off" autocapitalize="characters" spellcheck="false"
        oninput="this.value=this.value.toUpperCase().replace(/[^A-HJ-NPR-Z0-9]/g,'')">
      <button class="lookup-btn" onclick="lookupVin()">Look Up</button>
    </div>
    <div class="examples-row">
      <span class="examples-label">Try an example:</span>
      <button class="ex-btn" onclick="setVin('1HGBH41JXMN109186')">Honda Civic</button>
      <button class="ex-btn" onclick="setVin('1FTFW1ET5DFC10312')">Ford F-150</button>
      <button class="ex-btn" onclick="setVin('1G1ZT53806F109149')">Chevy Malibu</button>
      <button class="ex-btn" onclick="setVin('JN1AZ4EH8FM730608')">Nissan 370Z</button>
      <button class="ex-btn" onclick="setVin('5NPE34AF8FH054070')">Hyundai Sonata</button>
      <button class="ex-btn" onclick="setVin('1C4RJFBG9FC198252')">Jeep Grand Cherokee</button>
      <button class="ex-btn" onclick="setVin('WMWSX3C55CT465659')">MINI Cooper</button>
    </div>
  </div>
  <div class="error-bar" id="error-bar"></div>
  <div class="decoded-pill" id="decoded-pill"></div>
  <div class="result-card" id="result-card"></div>
</div>
<script>

  'YV1':'VOLVO','YV4':'VOLVO'
};

const YEAR_MAP = {
  'A':1980,'B':1981,'C':1982,'D':1983,'E':1984,'F':1985,'G':1986,'H':1987,
  'J':1988,'K':1989,'L':1990,'M':1991,'N':1992,'P':1993,'R':1994,'S':1995,
  'T':1996,'V':1997,'W':1998,'X':1999,'Y':2000,'1':2001,'2':2002,'3':2003,
  '4':2004,'5':2005,'6':2006,'7':2007,'8':2008,'9':2009
};
const YEAR_MAP2 = {
  'A':2010,'B':2011,'C':2012,'D':2013,'E':2014,'F':2015,'G':2016,'H':2017,
  'J':2018,'K':2019,'L':2020,'M':2021,'N':2022,'P':2023,'R':2024,'S':2025,'T':2026
};

function decodeYear(vin) {
  const c = vin[9];
  const wmi3 = vin.slice(0,3);
  const make = WMI_MAP[wmi3];
  if (!make) return null;
  const isEU = ['W','S','V','X','Y','Z','T'].some(p => vin[0] === p);
  const yr1 = YEAR_MAP[c];
  const yr2 = YEAR_MAP2[c];
  if (!yr1 && !yr2) return null;
  if (yr1 && !yr2) return yr1;
  if (!yr1 && yr2) return yr2;
  return yr2;
}

function decodeVin(vin) {
  if (!vin || vin.length !== 17) return null;
  const wmi = vin.slice(0,3);
  const make = WMI_MAP[wmi];
  const year = decodeYear(vin);
  if (!make || !year) return null;
  return { make, year, wmi, yearChar: vin[9] };
}

const TIER_LABELS = ['','Tier 1 — Standard OBD','Tier 2 — Advanced / BCM','Tier 3 — EEPROM / Module','Tier 4 — Quote by VIN'];
const TIER_CLASS  = ['','t1','t2','t3','t4'];

function setVin(v) { document.getElementById('vin-input').value = v; lookupVin(); }
function flagClass(t) { return {warn:'flag-warn',info:'flag-info',danger:'flag-danger',success:'flag-success'}[t]||'flag-info'; }

function lookupVin() {
  const raw = document.getElementById('vin-input').value.trim().toUpperCase().replace(/[^A-HJ-NPR-Z0-9]/g,'');
  const err = document.getElementById('error-bar');
  err.style.display = 'none';
  document.getElementById('decoded-pill').style.display = 'none';
  document.getElementById('result-card').style.display = 'none';

  if (raw.length !== 17) {
    err.textContent = 'VIN must be exactly 17 characters. Check the number and try again.';
    err.style.display = 'block'; return;
  }

  const v = decodeVin(raw);
  if (!v) {
    err.textContent = 'Could not identify make or year from that VIN. The WMI code (' + raw.slice(0,3) + ') is not in the current database. You can verify at vpic.nhtsa.dot.gov.';
    err.style.display = 'block'; return;
  }

  const pill = document.getElementById('decoded-pill');
  pill.innerHTML = 'Decoded: <strong>' + v.year + ' ' + v.make + '</strong> &nbsp;&middot;&nbsp; WMI: ' + v.wmi + ' &nbsp;&middot;&nbsp; Year code: ' + v.yearChar;
  pill.style.display = 'block';

  let matched = null;
  for (const g of MATRIX) {
    if (g.makes.includes(v.make)) {
      for (const r of g.rules) {
        if (r.test(v)) { matched = { groupName: g.group, rule: r }; break; }
      }
      if (matched) break;
    }
  }

  if (!matched) {
    matched = { groupName:'Unknown / Not in matrix', rule:{
      tier:4, keyType:'Unknown — manual lookup required',
      aak:'Quote by VIN', akl:'Quote by VIN', time:'VIN required first', tool:'Confirm with Autel vehicle list',
      flags:['warn:Vehicle not in current matrix — check Autel vehicle list manually','danger:Do not quote without confirming tool coverage first'],
      script:'I need to look up your exact vehicle in my system before I can give you a price — can you confirm the full VIN so I can verify coverage?'
    }};
  }

  const r = matched.rule;
  const flagsHTML = r.flags.map(f => {
    const i = f.indexOf(':'); const type = f.slice(0,i); const text = f.slice(i+1);
    return '<div class="flag-item ' + flagClass(type) + '"><div class="flag-dot"></div><span>' + text + '</span></div>';
  }).join('');

  const card = document.getElementById('result-card');
  card.innerHTML =
    '<div class="result-tier-bar">' +
      '<span class="tier-badge ' + TIER_CLASS[r.tier] + '">' + TIER_LABELS[r.tier] + '</span>' +
      '<div class="tier-vehicle">' + v.year + ' ' + v.make + '</div>' +
      '<div class="tier-keytype">' + r.keyType + ' &nbsp;&middot;&nbsp; ' + matched.groupName + '</div>' +
    '</div>' +
    '<div class="price-grid">' +
      '<div class="price-box aak"><div class="price-box-label">Add-a-Key — Labor</div><div class="price-box-value">' + r.aak + '</div><div class="price-box-note">Key billed separately &nbsp;&middot;&nbsp; ' + r.time.split('/')[0].trim() + '</div></div>' +
      '<div class="price-box akl"><div class="price-box-label">All Keys Lost — Labor</div><div class="price-box-value">' + r.akl + '</div><div class="price-box-note">Key billed separately &nbsp;&middot;&nbsp; Always confirm with VIN</div></div>' +
    '</div>' +
    '<div class="info-grid">' +
      '<div class="info-cell"><div class="info-cell-label">Tool required</div><div class="info-cell-value">' + r.tool + '</div></div>' +
      '<div class="info-cell"><div class="info-cell-label">Est. time on-site</div><div class="info-cell-value">' + r.time + '</div></div>' +
    '</div>' +
    (flagsHTML ? '<div class="flags-section">' + flagsHTML + '</div>' : '') +
    '<div class="script-section"><div class="script-section-label">Suggested phone line</div><div class="script-text">"' + r.script + '"</div></div>';

  card.style.display = 'block';
  card.scrollIntoView({ behavior:'smooth', block:'start' });
}

document.getElementById('vin-input').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') lookupVin();
});
</script>
