<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CKC Job Planner — Daily Appointment Preparation</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&family=Crimson+Pro:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --ckc-gold: #d4af37;
            --ckc-gold-dark: #b8941f;
            --ckc-gold-light: #e8c75a;
            --ckc-navy: #1a2332;
            --ckc-navy-light: #2a3442;
            --ckc-slate: #64748b;
            --ckc-slate-light: #94a3b8;
            --ckc-white: #ffffff;
            --ckc-gray-50: #f8fafc;
            --ckc-gray-100: #f1f5f9;
            --ckc-gray-200: #e2e8f0;
            --ckc-gray-800: #1e293b;
            --ckc-gray-900: #0f172a;
            --ckc-success: #10b981;
            --ckc-warning: #f59e0b;
            --ckc-error: #ef4444;
            --ckc-info: #3b82f6;
            --ckc-shadow: 0 1px 3px rgba(0,0,0,0.12), 0 1px 2px rgba(0,0,0,0.24);
            --ckc-shadow-lg: 0 10px 25px rgba(0,0,0,0.15), 0 4px 10px rgba(0,0,0,0.1);
            --ckc-border-radius: 8px;
            --ckc-transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Crimson Pro', serif;
            background: linear-gradient(135deg, var(--ckc-navy) 0%, var(--ckc-navy-light) 100%);
            color: var(--ckc-white);
            min-height: 100vh;
            line-height: 1.6;
        }

        .app-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
            min-height: 100vh;
        }

        .app-header {
            text-align: center;
            margin-bottom: 40px;
            padding: 30px 0;
            background: rgba(212, 175, 55, 0.1);
            border-radius: var(--ckc-border-radius);
            border: 2px solid var(--ckc-gold);
        }

        .app-title {
            font-family: 'JetBrains Mono', monospace;
            font-size: 2.2rem;
            font-weight: 700;
            color: var(--ckc-gold);
            margin-bottom: 10px;
            letter-spacing: -0.5px;
        }

        .app-subtitle {
            font-size: 1.1rem;
            color: var(--ckc-slate-light);
            font-weight: 500;
        }

        .date-selector {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            margin: 30px 0;
            padding: 20px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: var(--ckc-border-radius);
        }

        .date-nav-btn {
            background: var(--ckc-gold);
            color: var(--ckc-navy);
            border: none;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            font-size: 1.2rem;
            font-weight: 600;
            cursor: pointer;
            transition: var(--ckc-transition);
        }

        .date-nav-btn:hover {
            background: var(--ckc-gold-dark);
            transform: scale(1.1);
        }

        .current-date {
            font-family: 'JetBrains Mono', monospace;
            font-size: 1.5rem;
            font-weight: 600;
            color: var(--ckc-white);
            min-width: 250px;
            text-align: center;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin: 30px 0;
        }

        .stat-card {
            background: var(--ckc-white);
            color: var(--ckc-gray-800);
            padding: 25px;
            border-radius: var(--ckc-border-radius);
            box-shadow: var(--ckc-shadow);
            text-align: center;
            border: 2px solid transparent;
            transition: var(--ckc-transition);
        }

        .stat-card:hover {
            border-color: var(--ckc-gold);
            transform: translateY(-2px);
            box-shadow: var(--ckc-shadow-lg);
        }

        .stat-number {
            font-family: 'JetBrains Mono', monospace;
            font-size: 2.5rem;
            font-weight: 700;
            color: var(--ckc-gold);
            margin-bottom: 5px;
        }

        .stat-label {
            font-size: 1rem;
            font-weight: 600;
            color: var(--ckc-slate);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .appointments-container {
            background: var(--ckc-white);
            color: var(--ckc-gray-800);
            border-radius: var(--ckc-border-radius);
            box-shadow: var(--ckc-shadow-lg);
            overflow: hidden;
        }

        .appointments-header {
            background: linear-gradient(135deg, var(--ckc-gold) 0%, var(--ckc-gold-light) 100%);
            color: var(--ckc-navy);
            padding: 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .appointments-title {
            font-family: 'JetBrains Mono', monospace;
            font-size: 1.5rem;
            font-weight: 700;
        }

        .refresh-btn {
            background: var(--ckc-navy);
            color: var(--ckc-white);
            border: none;
            padding: 10px 20px;
            border-radius: var(--ckc-border-radius);
            font-family: 'JetBrains Mono', monospace;
            font-weight: 600;
            cursor: pointer;
            transition: var(--ckc-transition);
        }

        .refresh-btn:hover {
            background: var(--ckc-navy-light);
            transform: translateY(-1px);
        }

        .appointment-card {
            border-bottom: 1px solid var(--ckc-gray-200);
            padding: 30px;
            transition: var(--ckc-transition);
            position: relative;
        }

        .appointment-card:last-child {
            border-bottom: none;
        }

        .appointment-card:hover {
            background: var(--ckc-gray-50);
        }

        .appointment-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 20px;
        }

        .appointment-time {
            font-family: 'JetBrains Mono', monospace;
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--ckc-gold);
            margin-bottom: 5px;
        }

        .appointment-duration {
            font-size: 0.9rem;
            color: var(--ckc-slate);
            font-weight: 500;
        }

        .customer-info {
            flex: 1;
            margin: 0 30px;
        }

        .customer-name {
            font-family: 'JetBrains Mono', monospace;
            font-size: 1.3rem;
            font-weight: 600;
            color: var(--ckc-navy);
            margin-bottom: 5px;
        }

        .customer-details {
            color: var(--ckc-slate);
            line-height: 1.5;
        }

        .vehicle-info {
            background: linear-gradient(135deg, var(--ckc-gray-50) 0%, var(--ckc-gray-100) 100%);
            padding: 15px 20px;
            border-radius: var(--ckc-border-radius);
            margin: 15px 0;
        }

        .vehicle-title {
            font-family: 'JetBrains Mono', monospace;
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--ckc-navy);
            margin-bottom: 8px;
        }

        .vehicle-details {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 10px;
            font-size: 0.95rem;
        }

        .vehicle-detail {
            display: flex;
            justify-content: space-between;
        }

        .vehicle-detail-label {
            font-weight: 600;
            color: var(--ckc-slate);
        }

        .vehicle-detail-value {
            color: var(--ckc-gray-800);
        }

        .tools-section {
            margin-top: 20px;
        }

        .tools-title {
            font-family: 'JetBrains Mono', monospace;
            font-size: 1rem;
            font-weight: 600;
            color: var(--ckc-navy);
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .tools-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 10px;
        }

        .tool-item {
            background: var(--ckc-white);
            border: 2px solid var(--ckc-gray-200);
            border-radius: var(--ckc-border-radius);
            padding: 12px 15px;
            text-align: center;
            font-weight: 600;
            color: var(--ckc-gray-800);
            transition: var(--ckc-transition);
        }

        .tool-item:hover {
            border-color: var(--ckc-gold);
            background: var(--ckc-gold);
            color: var(--ckc-navy);
        }

        .job-complexity {
            position: absolute;
            top: 20px;
            right: 20px;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .complexity-low {
            background: linear-gradient(135deg, #dcfce7 0%, #bbf7d0 100%);
            color: #15803d;
        }

        .complexity-medium {
            background: linear-gradient(135deg, #fef3c7 0%, #fde68a 100%);
            color: #92400e;
        }

        .complexity-high {
            background: linear-gradient(135deg, #fee2e2 0%, #fecaca 100%);
            color: #dc2626;
        }

        .pricing-summary {
            background: linear-gradient(135deg, #f0f9ff 0%, #e0f2fe 100%);
            border: 2px solid var(--ckc-info);
            border-radius: var(--ckc-border-radius);
            padding: 15px 20px;
            margin-top: 15px;
        }

        .pricing-total {
            font-family: 'JetBrains Mono', monospace;
            font-size: 1.4rem;
            font-weight: 700;
            color: var(--ckc-navy);
            text-align: center;
        }

        .no-appointments {
            padding: 60px;
            text-align: center;
            color: var(--ckc-slate);
        }

        .no-appointments h3 {
            font-family: 'JetBrains Mono', monospace;
            font-size: 1.3rem;
            margin-bottom: 10px;
            color: var(--ckc-slate);
        }

        .loading {
            text-align: center;
            padding: 60px;
        }

        .loading-spinner {
            width: 40px;
            height: 40px;
            border: 4px solid var(--ckc-gray-200);
            border-top: 4px solid var(--ckc-gold);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @media (max-width: 768px) {
            .app-title {
                font-size: 1.8rem;
            }

            .date-selector {
                flex-direction: column;
                gap: 15px;
            }

            .appointment-header {
                flex-direction: column;
                gap: 15px;
            }

            .customer-info {
                margin: 0;
            }

            .tools-grid {
                grid-template-columns: repeat(auto-fit, minmax(100px, 1fr));
            }

            .vehicle-details {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="app-container">
        <!-- App Header -->
        <div class="app-header">
            <h1 class="app-title">🔧 CKC Job Planner</h1>
            <p class="app-subtitle">Daily Appointment Preparation & Tool Requirements</p>
        </div>

        <!-- Date Navigation -->
        <div class="date-selector">
            <button class="date-nav-btn" onclick="changeDate(-1)">←</button>
            <div class="current-date" id="currentDate">Today - Friday, April 17, 2026</div>
            <button class="date-nav-btn" onclick="changeDate(1)">→</button>
        </div>

        <!-- Daily Statistics -->
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-number" id="totalAppointments">0</div>
                <div class="stat-label">Appointments</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="totalHours">0h</div>
                <div class="stat-label">Total Time</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="totalRevenue">$0</div>
                <div class="stat-label">Expected Revenue</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="uniqueTools">0</div>
                <div class="stat-label">Tools Needed</div>
            </div>
        </div>

        <!-- Appointments Container -->
        <div class="appointments-container">
            <div class="appointments-header">
                <h2 class="appointments-title">📅 Daily Schedule</h2>
                <button class="refresh-btn" onclick="loadAppointments()">🔄 Refresh</button>
            </div>
            
            <div id="appointmentsContent">
                <div class="loading">
                    <div class="loading-spinner"></div>
                    <p>Loading appointments from Google Calendar...</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ════════════════════════════════════════════════════════════════════
        // CKC JOB PLANNER — APPOINTMENT PREPARATION SYSTEM
        // ════════════════════════════════════════════════════════════════════

        let currentDate = new Date();
        let appointments = [];

        // Mock data for development - replace with Google Calendar API
        const mockAppointments = [
            {
                id: 'apt1',
                time: '10:00 AM',
                duration: '1-2 hours',
                customer: {
                    name: 'John Smith',
                    phone: '(336) 555-1234',
                    email: 'john.smith@email.com'
                },
                vehicle: {
                    year: '2015',
                    make: 'Ford',
                    model: 'F-150',
                    vin: '1FTFW1ET5DFC12345'
                },
                service: {
                    type: 'AAK',
                    keyType: 'Smart Key',
                    sku: 'FOR-94-SM',
                    price: 189.99,
                    programmingFee: 125,
                    total: 314.99
                },
                tools: ['IM508', 'XP400Pro', 'EEPROM kit'],
                complexity: 'high',
                notes: 'VIN verified - confirmed FCC M3N-A2C31243300'
            },
            {
                id: 'apt2',
                time: '2:00 PM',
                duration: '30-45 minutes',
                customer: {
                    name: 'Mary Johnson',
                    phone: '(336) 555-5678',
                    email: 'mary.j@gmail.com'
                },
                vehicle: {
                    year: '2018',
                    make: 'Honda',
                    model: 'Civic',
                    vin: '19XFC2F59JE012345'
                },
                service: {
                    type: 'AAK',
                    keyType: 'Transponder Key',
                    sku: 'HON-07-AM',
                    price: 34.99,
                    programmingFee: 75,
                    total: 109.99
                },
                tools: ['IM508'],
                complexity: 'low',
                notes: 'Standard transponder programming'
            },
            {
                id: 'apt3',
                time: '4:30 PM',
                duration: '2-3 hours',
                customer: {
                    name: 'Robert Wilson',
                    phone: '(336) 555-9012',
                    email: 'rwilson@company.com'
                },
                vehicle: {
                    year: '2019',
                    make: 'BMW',
                    model: 'X5',
                    vin: '5UXCR6C0XKL012345'
                },
                service: {
                    type: 'AKL',
                    keyType: 'Smart Key',
                    sku: 'BMW-X5-SM',
                    price: 389.99,
                    programmingFee: 275,
                    total: 664.99,
                    special: 'Weekend Rate Applied'
                },
                tools: ['IM508', 'XP400Pro', 'EEPROM kit', 'Possible bench work'],
                complexity: 'high',
                notes: 'Complex AKL job - weekend premium rate'
            }
        ];

        // Initialize app
        document.addEventListener('DOMContentLoaded', function() {
            updateDateDisplay();
            loadAppointments();
        });

        function updateDateDisplay() {
            const options = { 
                weekday: 'long', 
                year: 'numeric', 
                month: 'long', 
                day: 'numeric' 
            };
            
            const today = new Date();
            const isToday = currentDate.toDateString() === today.toDateString();
            const dateStr = currentDate.toLocaleDateString('en-US', options);
            
            document.getElementById('currentDate').textContent = 
                isToday ? `Today - ${dateStr}` : dateStr;
        }

        function changeDate(delta) {
            currentDate.setDate(currentDate.getDate() + delta);
            updateDateDisplay();
            loadAppointments();
        }

        async function loadAppointments() {
            document.getElementById('appointmentsContent').innerHTML = `
                <div class="loading">
                    <div class="loading-spinner"></div>
                    <p>Loading appointments from Google Calendar...</p>
                </div>
            `;

            try {
                // Simulate API call delay
                await new Promise(resolve => setTimeout(resolve, 1000));
                
                // In production, this would call Google Calendar API
                // appointments = await fetchGoogleCalendarEvents(currentDate);
                
                // For demo, use mock data only for today
                const today = new Date();
                if (currentDate.toDateString() === today.toDateString()) {
                    appointments = mockAppointments;
                } else {
                    appointments = [];
                }

                renderAppointments();
                updateStatistics();

            } catch (error) {
                console.error('Failed to load appointments:', error);
                document.getElementById('appointmentsContent').innerHTML = `
                    <div class="no-appointments">
                        <h3>⚠️ Failed to Load</h3>
                        <p>Unable to connect to Google Calendar. Please check your connection and try again.</p>
                    </div>
                `;
            }
        }

        function renderAppointments() {
            const container = document.getElementById('appointmentsContent');
            
            if (appointments.length === 0) {
                container.innerHTML = `
                    <div class="no-appointments">
                        <h3>📅 No Appointments Scheduled</h3>
                        <p>You have no appointments for this date. Enjoy your day off!</p>
                    </div>
                `;
                return;
            }

            const appointmentCards = appointments.map(apt => renderAppointmentCard(apt)).join('');
            container.innerHTML = appointmentCards;
        }

        function renderAppointmentCard(apt) {
            const complexityClass = `complexity-${apt.complexity}`;
            const complexityLabel = apt.complexity.charAt(0).toUpperCase() + apt.complexity.slice(1);
            
            return `
                <div class="appointment-card">
                    <div class="job-complexity ${complexityClass}">${complexityLabel}</div>
                    
                    <div class="appointment-header">
                        <div>
                            <div class="appointment-time">${apt.time}</div>
                            <div class="appointment-duration">Duration: ${apt.duration}</div>
                        </div>
                        
                        <div class="customer-info">
                            <div class="customer-name">${apt.customer.name}</div>
                            <div class="customer-details">
                                📞 ${apt.customer.phone}<br>
                                📧 ${apt.customer.email}
                            </div>
                        </div>
                    </div>

                    <div class="vehicle-info">
                        <div class="vehicle-title">🚗 Vehicle Information</div>
                        <div class="vehicle-details">
                            <div class="vehicle-detail">
                                <span class="vehicle-detail-label">Vehicle:</span>
                                <span class="vehicle-detail-value">${apt.vehicle.year} ${apt.vehicle.make} ${apt.vehicle.model}</span>
                            </div>
                            <div class="vehicle-detail">
                                <span class="vehicle-detail-label">VIN:</span>
                                <span class="vehicle-detail-value">${apt.vehicle.vin}</span>
                            </div>
                            <div class="vehicle-detail">
                                <span class="vehicle-detail-label">Service:</span>
                                <span class="vehicle-detail-value">${apt.service.type} (${apt.service.keyType})</span>
                            </div>
                            <div class="vehicle-detail">
                                <span class="vehicle-detail-label">SKU:</span>
                                <span class="vehicle-detail-value">${apt.service.sku}</span>
                            </div>
                        </div>
                    </div>

                    <div class="tools-section">
                        <div class="tools-title">🔧 Tools Required</div>
                        <div class="tools-grid">
                            ${apt.tools.map(tool => `<div class="tool-item">${tool}</div>`).join('')}
                        </div>
                    </div>

                    <div class="pricing-summary">
                        <div class="pricing-total">
                            Total: $${apt.service.total.toFixed(2)}
                            ${apt.service.special ? `<div style="font-size:0.9rem;color:var(--ckc-warning);margin-top:5px;">${apt.service.special}</div>` : ''}
                        </div>
                    </div>

                    ${apt.notes ? `
                        <div style="margin-top:15px;padding:10px 15px;background:var(--ckc-gray-50);border-radius:var(--ckc-border-radius);font-size:0.9rem;color:var(--ckc-slate);">
                            <strong>Notes:</strong> ${apt.notes}
                        </div>
                    ` : ''}
                </div>
            `;
        }

        function updateStatistics() {
            const totalAppointments = appointments.length;
            const totalRevenue = appointments.reduce((sum, apt) => sum + apt.service.total, 0);
            
            // Calculate total time (rough estimate)
            let totalMinutes = 0;
            appointments.forEach(apt => {
                // Parse duration estimate
                if (apt.duration.includes('30')) totalMinutes += 30;
                else if (apt.duration.includes('45')) totalMinutes += 45;
                else if (apt.duration.includes('1-2')) totalMinutes += 90;
                else if (apt.duration.includes('2-3')) totalMinutes += 150;
                else totalMinutes += 60; // Default 1 hour
            });
            
            const totalHours = Math.round(totalMinutes / 60 * 10) / 10;
            
            // Get unique tools
            const allTools = new Set();
            appointments.forEach(apt => {
                apt.tools.forEach(tool => allTools.add(tool));
            });

            // Update UI
            document.getElementById('totalAppointments').textContent = totalAppointments;
            document.getElementById('totalHours').textContent = `${totalHours}h`;
            document.getElementById('totalRevenue').textContent = `$${totalRevenue.toFixed(0)}`;
            document.getElementById('uniqueTools').textContent = allTools.size;
        }

        // Mock Google Calendar API function
        async function fetchGoogleCalendarEvents(date) {
            // In production, this would integrate with Google Calendar API
            // const events = await gapi.client.calendar.events.list({
            //     calendarId: 'primary',
            //     timeMin: startOfDay.toISOString(),
            //     timeMax: endOfDay.toISOString(),
            //     singleEvents: true,
            //     orderBy: 'startTime'
            // });
            
            // For now, return mock data
            return mockAppointments;
        }

        // Development helpers
        window.plannerDebug = {
            appointments: () => appointments,
            loadMockData: () => {
                appointments = mockAppointments;
                renderAppointments();
                updateStatistics();
            },
            clearData: () => {
                appointments = [];
                renderAppointments();
                updateStatistics();
            }
        };

        console.log('CKC Job Planner loaded. Use plannerDebug for development helpers.');
    </script>
</body>
</html>
